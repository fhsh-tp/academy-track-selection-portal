server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # GET → serve HTML; POST → proxy to backend
    # nginx Static File Serving + nginx API Proxy
    location = /login {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        try_files /login.html =404;

        limit_except GET {
            proxy_pass http://backend:8000;
        }
    }

    location = /admin-login {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        try_files /admin-login.html =404;

        limit_except GET {
            proxy_pass http://backend:8000;
        }
    }

    # API-only endpoints (all methods proxied)
    location = /submit {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static HTML pages (clean URLs)
    location = / {
        try_files /index.html =404;
    }

    location = /choose {
        try_files /choose.html =404;
    }

    location = /admin {
        try_files /admin.html =404;
    }

    # All other static assets (CSS, JS, fonts, etc.)
    location /static {
        try_files $uri =404;
    }
}
