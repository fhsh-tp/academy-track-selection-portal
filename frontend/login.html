<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://student-choice-sys.onrender.com;">
    <meta charset="UTF-8">
    <title>學生登入 - 選班群系統</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container login-box">
        <h2>學生登入</h2>
        <input type="text" id="sid" placeholder="學號 (如: 11400000)" class="input-field">
        <input type="password" id="pwd" placeholder="密碼" class="input-field">
        <button id="loginBtn" onclick="doLogin()" class="btn-primary">確認登入</button>
        </div>

    <script src="/static/config.js"></script>
    <script>
        async function doLogin() {
            const sid = document.getElementById('sid').value;
            const pwd = document.getElementById('pwd').value;
            

            if (!sid || !pwd) {
                Swal.fire({ icon: 'warning', title: '請填寫完整', text: '學號與密碼皆為必填' });
                return;
            }

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ student_id: sid, password: pwd })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('jwt_token', data.access_token);
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('userName', data.name);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userId', data.student_id);
                    localStorage.setItem('user_class_num', data.student_class_num);
                    

                    Swal.fire({
                        icon: 'success',
                        title: '登入成功',
                        text: '導向中...',
                        showConfirmButton: false,
                        timer: 1000
                    }).then(() => {
                        window.location.href = data.role === 'admin' ? '/admin' : '/choose';
                    });
                } else {

                    Swal.fire({ 
                        icon: 'error', 
                        title: '登入失敗', 
                        text: data.detail || '帳號或密碼錯誤' 
                    });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: '系統錯誤', text: '伺服器連線失敗，請稍後再試' });
            }
        }
    </script>
</body>
</html>
