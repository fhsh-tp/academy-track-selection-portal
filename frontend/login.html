<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>學生登入 - 選類組系統</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container login-box">
        <h2>學生登入</h2>
        <input type="text" id="sid" placeholder="學號 (如: 114001)" class="input-field">
        <input type="password" id="pwd" placeholder="密碼" class="input-field">
        <button id="loginBtn" onclick="doLogin()" class="btn-primary">確認登入</button>
        </div>

    <script src="/static/config.js"></script>
    <script>
        async function doLogin() {
            const sid = document.getElementById('sid').value;
            const pwd = document.getElementById('pwd').value;
            
            // 前端簡易防呆
            if (!sid || !pwd) {
                Swal.fire({ icon: 'warning', title: '請填寫完整', text: '學號與密碼皆為必填' });
                return;
            }

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ student_id: sid, password: pwd })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('jwt_token', data.access_token);
                    localStorage.setItem('user_role', data.role);
                    
                    // 成功時的彈窗
                    Swal.fire({
                        icon: 'success',
                        title: '登入成功',
                        text: '導向中...',
                        showConfirmButton: false,
                        timer: 1000
                    }).then(() => {
                        window.location.href = data.role === 'admin' ? '/admin' : '/choose';
                    });
                } else {
                    // 登入失敗顯示
                    Swal.fire({ 
                        icon: 'error', 
                        title: '登入失敗', 
                        text: data.detail || '帳號或密碼錯誤' 
                    });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: '系統錯誤', text: '伺服器連線失敗，請稍後再試' });
            }
        }
    </script>
</body>
</html>
