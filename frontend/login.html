<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>身分驗證 - 選類組系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container login-box">
        <h2>學生/管理員登入</h2>
        <input type="text" id="sid" placeholder="學號 (如: 114001)" class="input-field">
        <input type="password" id="pwd" placeholder="密碼" class="input-field">
        <button id="loginBtn" onclick="doLogin()" class="btn-primary">確認登入</button>
        <p id="error" style="color:red;"></p>
    </div>

    <script src="config.js"></script>
    <script>
        async function doLogin() {
            const sid = document.getElementById('sid').value;
            const pwd = document.getElementById('pwd').value;
            
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ student_id: sid, password: pwd })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('jwt_token', data.access_token);
                    localStorage.setItem('user_role', data.role);
                    // 根據角色導向不同頁面
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'choose.html';
                } else {
                    document.getElementById('error').innerText = data.detail;
                }
            } catch (e) {
                alert("伺服器連線失敗");
            }
        }
    </script>
</body>
</html>
