<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://student-choice-sys.onrender.com;">
    <meta charset="UTF-8">
    <title>志願選填 - 選類組系統</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container wide">
        <h1>選類組作業</h1>
        <div class="options-container">
            <div class="choice-box" onclick="selectChoice(1)" id="box1"><h3>一類組 (文法商數A)</h3></div>
            <div class="choice-box" onclick="selectChoice(2)" id="box2"><h3>一類組 (文法商數B)</h3></div>
            <div class="choice-box" onclick="selectChoice(3)" id="box3"><h3>二類組 (理工資)</h3></div>
            <div class="choice-box" onclick="selectChoice(4)" id="box4"><h3>三類組 (生醫農)</h3></div>
        </div>
        <button id="submitBtn" onclick="submitChoice()" class="btn-primary">確認送出</button>
    </div>

    <script src="/static/config.js"></script>
    <script>
        let currentChoice = null;

        function selectChoice(num) {
            currentChoice = num;
            // 清除之前的 active 樣式
            document.querySelectorAll('.choice-box').forEach(el => el.classList.remove('active'));
            // 加上選取的樣式
            document.getElementById('box' + num).classList.add('active');
        }

        async function submitChoice() {
            if (!currentChoice) {
                Swal.fire({ icon: 'warning', title: '尚未選擇', text: '請先點選一個類組' });
                return;
            }

            const result = await Swal.fire({
                title: '確認送出？',
                text: "請再三確認，送出後系統將開始處理",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '確定送出',
                cancelButtonText: '再檢查一下'
            });

            if (result.isConfirmed) {
                // --- 核心改動：開始處理流量防護 ---
                const btn = document.getElementById('submitBtn');
                btn.disabled = true; // 禁用按鈕防止重複點擊
                btn.innerText = "處理中，請稍候...";
                
                // 顯示一個轉圈圈，讓學生知道系統在跑，不要亂動
                Swal.fire({
                    title: '處理中',
                    text: '正在紀錄您的選擇，請勿關閉視窗...',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                const token = localStorage.getItem('jwt_token');
                try {
                    const res = await fetch(`${CONFIG.API_BASE_URL}/submit`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ choice: currentChoice })
                    });
                    
                    if (res.ok) {
                        Swal.fire({ 
                            icon: 'success', 
                            title: '送出成功', 
                            text: '您的選擇已記錄，將返回首頁' 
                        }).then(() => {
                            window.location.href = '/';
                        });
                    } else {
                        const err = await res.json();
                        Swal.fire({ icon: 'error', title: '送出失敗', text: err.detail || '請洽管理員' });
                        // 失敗了，要把按鈕恢復
                        btn.disabled = false;
                        btn.innerText = "確認送出";
                    }
                } catch (e) {
                    Swal.fire({ icon: 'error', title: '系統錯誤', text: '伺服器目前忙碌中，請稍後再試' });
                    // 系統報錯也要把按鈕恢復
                    btn.disabled = false;
                    btn.innerText = "確認送出";
                }
            }
        }
    </script>
</body>
</html>
