<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>志願選填 - 選類組系統</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container wide">
        <h1>選類組作業</h1>
        <div class="options-container">
            <div class="choice-box" onclick="selectChoice(1)" id="box1"><h3>一類組 (數A)</h3></div>
            <div class="choice-box" onclick="selectChoice(4)" id="box4"><h3>一類組 (數B)</h3></div>
            <div class="choice-box" onclick="selectChoice(2)" id="box2"><h3>二類組 (理工)</h3></div>
            <div class="choice-box" onclick="selectChoice(3)" id="box3"><h3>三類組 (生醫農)</h3></div>
        </div>
        <button id="submitBtn" onclick="submitChoice()" class="btn-primary">確認送出</button>
    </div>

    <script src="/static/config.js"></script>
    <script>
        let currentChoice = null;

        function selectChoice(num) {
            currentChoice = num;
            // 清除之前的 active 樣式
            document.querySelectorAll('.choice-box').forEach(el => el.classList.remove('active'));
            // 加上選取的樣式
            document.getElementById('box' + num).classList.add('active');
        }

        async function submitChoice() {
            if (!currentChoice) {
                Swal.fire({ icon: 'warning', title: '尚未選擇', text: '請先點選一個類組' });
                return;
            }

            const result = await Swal.fire({
                title: '確認送出？',
                text: "請再三確認",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '確定送出',
                cancelButtonText: '再檢查一下'
            });

            if (result.isConfirmed) {
                const token = localStorage.getItem('jwt_token');
                try {
                    const res = await fetch(`${CONFIG.API_BASE_URL}/submit`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ choice: currentChoice })
                    });
                    
                    if (res.ok) {
                        Swal.fire({ 
                            icon: 'success', 
                            title: '送出成功', 
                            text: '您的選擇已記錄，將返回首頁' 
                        }).then(() => {
                            window.location.href = '/';
                        });
                    } else {
                        const err = await res.json();
                        Swal.fire({ icon: 'error', title: '送出失敗', text: err.detail || '請洽管理員' });
                    }
                } catch (e) {
                    Swal.fire({ icon: 'error', title: '系統錯誤', text: '伺服器連線中斷' });
                }
            }
        }
    </script>
</body>
</html>
