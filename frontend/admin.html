<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理員後台</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* 新增排版樣式 */
        .top-left { position: absolute; top: 20px; left: 20px; }
        .bottom-right { display: flex; justify-content: flex-end; margin-top: 30px; }
        .password-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; width: 300px; }
        .btn-logout { background-color: #d93025; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        .btn-export { background-color: #0f9d58; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="top-left">
        <button onclick="logout()" class="btn-logout">登出系統</button>
    </div>

    <div class="container wide">
        <h2 style="text-align: center;">管理員後台</h2>
        
        <table border="1" id="data-table" style="width:100%; border-collapse: collapse;">
            <thead>
                <tr><th>學號</th><th>姓名</th><th>類組</th><th>更新時間</th></tr>
            </thead>
            <tbody></tbody>
        </table>

        <div style="text-align: left;">
            <button onclick="exportToCSV()" class="btn-export">匯出成 CSV</button>
        </div>

        <div class="bottom-right">
            <div class="password-box">
                <h3 style="margin-top: 0;">修改管理員密碼</h3>
                <input type="password" id="oldPwd" placeholder="輸入舊密碼" class="input-field" style="width: 100%; margin-bottom: 10px;">
                <input type="password" id="newPwd" placeholder="輸入新密碼" class="input-field" style="width: 100%; margin-bottom: 10px;">
                <button onclick="changePassword()" class="btn-primary" style="width: 100%;">確認修改</button>
            </div>
        </div>
    </div>

    <script src="/static/config.js"></script>
    <script>
        // 修正後的類組對照表
        const groupMap = {
            1: "一類組(數A)",
            2: "二類組(理工)",
            3: "三類組(生醫農)",
            4: "一類組(數B)"
        };

        window.onload = () => {
            if (!localStorage.getItem('jwt_token')) {
                window.location.href = '/login';
            }
            loadData();
        };

        async function loadData() {
            const res = await fetch(`${CONFIG.API_BASE_URL}/admin/all`, {
                headers: {'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`}
            });
            
            if (res.status === 401 || res.status === 403) {
                Swal.fire({ icon: 'error', title: '權限不足', text: '請重新登入' }).then(() => {
                    window.location.href = '/login';
                });
                return;
            }
            
            const data = await res.json();
            const tbody = document.querySelector('#data-table tbody');
            tbody.innerHTML = data.map(row => {
                const groupName = groupMap[row.choice] || '未選';
                return `<tr>
                    <td>${row.student_id}</td>
                    <td>${row.name}</td>
                    <td>${groupName}</td>
                    <td>${row.updated_at || '-'}</td>
                </tr>`;
            }).join('');
        }

        async function exportToCSV() {
            const res = await fetch(`${CONFIG.API_BASE_URL}/admin/all`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` }
            });
            const data = await res.json();

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "學號,姓名,類組,更新時間\n";
            data.forEach(row => {
                const groupName = groupMap[row.choice] || '未選';
                csvContent += `${row.student_id},${row.name},${groupName},${row.updated_at || ''}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "選填資料.csv");
            document.body.appendChild(link);
            link.click();
        }

        async function changePassword() {
            const oldP = document.getElementById('oldPwd').value;
            const newP = document.getElementById('newPwd').value;
            const res = await fetch(`${CONFIG.API_BASE_URL}/change-password`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`
                },
                body: JSON.stringify({ old_password: oldP, new_password: newP })
            });
            
            if (res.ok) {
                Swal.fire({ icon: 'success', title: '修改成功' });
            } else {
                Swal.fire({ icon: 'error', title: '修改失敗', text: '請檢查舊密碼是否正確' });
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
