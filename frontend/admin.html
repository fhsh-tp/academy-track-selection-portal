<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理員後台</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container wide">
        <h2>管理員後台</h2>
        
        <div style="margin-bottom: 20px;">
            <button onclick="logout()" style="background-color: #d93025; color: white; padding: 10px; border: none; cursor: pointer;">登出系統</button>
            <button onclick="exportToCSV()" class="btn-primary" style="background-color: #0f9d58; padding: 10px; border: none; cursor: pointer;">匯出成 CSV</button>
        </div>
        
        <table border="1" id="data-table" style="width:100%; border-collapse: collapse; margin-bottom: 30px;">
            <thead>
                <tr><th>學號</th><th>姓名</th><th>類組</th><th>更新時間</th></tr>
            </thead>
            <tbody></tbody>
        </table>

        <hr>

        <h3>修改管理員密碼</h3>
        <input type="password" id="oldPwd" placeholder="輸入舊密碼" class="input-field">
        <input type="password" id="newPwd" placeholder="輸入新密碼" class="input-field">
        <button onclick="changePassword()" class="btn-primary">確認修改</button>
    </div>

    <script src="/static/config.js"></script>
    <script>
        const groupMap = {
            1: "一類組(數A)",
            2: "一類組(數B)",
            3: "二類組(理工)",
            4: "三類組(生醫農)"
        };

        window.onload = () => {
            if (!localStorage.getItem('jwt_token')) {
                window.location.href = '/login';
            }
            loadData();
        };

        async function loadData() {
            const res = await fetch(`${CONFIG.API_BASE_URL}/admin/all`, {
                headers: {'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`}
            });
            
            if (res.status === 401 || res.status === 403) {
                Swal.fire({ icon: 'error', title: '權限不足', text: '請重新登入' }).then(() => {
                    window.location.href = '/login';
                });
                return;
            }
            
            const data = await res.json();
            const tbody = document.querySelector('#data-table tbody');
            
            tbody.innerHTML = data.map(row => {
                const groupName = groupMap[row.choice] || '未選';
                return `<tr>
                    <td>${row.student_id}</td>
                    <td>${row.name}</td>
                    <td>${groupName}</td>
                    <td>${row.updated_at || '-'}</td>
                </tr>`;
            }).join('');
        }

        // 匯出 CSV 功能
        async function exportToCSV() {
            const res = await fetch(`${CONFIG.API_BASE_URL}/admin/all`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` }
            });
            const data = await res.json();

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "學號,姓名,類組,更新時間\n";

            data.forEach(row => {
                const groupName = groupMap[row.choice] || '未選';
                csvContent += `${row.student_id},${row.name},${groupName},${row.updated_at || ''}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "選填資料.csv");
            document.body.appendChild(link);
            link.click();
        }

        async function changePassword() {
            const oldP = document.getElementById('oldPwd').value;
            const newP = document.getElementById('newPwd').value;
            
            const res = await fetch(`${CONFIG.API_BASE_URL}/change-password`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`
                },
                body: JSON.stringify({ old_password: oldP, new_password: newP })
            });
            
            if (res.ok) {
                Swal.fire({ icon: 'success', title: '修改成功' });
            } else {
                Swal.fire({ icon: 'error', title: '修改失敗', text: '請檢查舊密碼是否正確' });
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
