<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://student-choice-sys.onrender.com;">
    <meta charset="UTF-8">
    <title>管理員後台</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .top-left { position: absolute; top: 20px; left: 20px; }
        .bottom-right { display: flex; justify-content: flex-end; margin-top: 30px; }
        .password-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; width: 300px; }
        .btn-logout { background-color: #d93025; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        .btn-export { background-color: #0f9d58; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .admin-panel { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
    </style>
</head>
<body>
    <div class="top-left">
        <button onclick="logout()" class="btn-logout">登出系統</button>
    </div>

    <div class="container wide">
        <h2 style="text-align: center;">管理員後台</h2>
        
        <table border="1" id="data-table" style="width:100%; border-collapse: collapse;">
            <thead>
                <tr><th>學號</th><th>姓名</th><th>班級座號</th><th>類組</th><th>更新時間</th></tr>
            </thead>
            <tbody></tbody>
        </table>

        <div style="margin-top: 20px; display: flex; gap: 20px;">
            <button onclick="exportToCSV()" class="btn-export">匯出成 CSV</button>
            
            <div class="admin-panel">
                <h3>學生資料批次匯入</h3>
                <input type="file" id="csvFile" accept=".csv">
                <button onclick="uploadCSV()" class="btn-primary">上傳 CSV</button>
                <p style="font-size: 0.8em; color: #666;">請確保 CSV 包含：學號, 姓名, 電子信箱</p>
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 20px;">
            <button onclick="exportToCSV()" class="btn-export">匯出成 CSV</button>
            
            <div class="admin-panel">
                </div>
        </div>
        
        <div style="margin-top: 20px; display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button onclick="exportToCSV()" class="btn-export">匯出成 CSV</button>
                <button onclick="sendReminders()" class="btn-reminder" id="reminderBtn">
                    📧 寄送未選填提醒信
                </button>
            </div>
            
            <div class="admin-panel" style="margin-top: 0;">
                <h3>學生資料批次匯入</h3>
                <input type="file" id="csvFile" accept=".csv">
                <button onclick="uploadCSV()" class="btn-primary">上傳 CSV</button>
                <p style="font-size: 0.8em; color: #666;">請確保 CSV 包含：學號, 姓名, 電子信箱, student_class_num</p>
            </div>
        </div>
        
        <style>
            /* ... 原有的樣式 ... */
            .btn-reminder { 
                background-color: #f4b400; /* 黃色，表示警告或提醒 */
                color: white; 
                border: none; 
                padding: 10px 20px; 
                cursor: pointer; 
                border-radius: 4px; 
                font-weight: bold;
                transition: background-color 0.3s;
            }
            .btn-reminder:hover { background-color: #d19a00; }
            .btn-reminder:disabled { background-color: #ccc; cursor: not-allowed; }
        </style>

        <div class="bottom-right">
            <div class="password-box">
                <h3 style="margin-top: 0;">修改管理員密碼</h3>
                <input type="password" id="oldPwd" placeholder="輸入舊密碼" class="input-field" style="width: 100%; margin-bottom: 10px;">
                <input type="password" id="newPwd" placeholder="輸入新密碼" class="input-field" style="width: 100%; margin-bottom: 10px;">
                <button onclick="changePassword()" class="btn-primary" style="width: 100%;">確認修改</button>
            </div>
        </div>
    </div>

    <script src="/static/config.js"></script>
    <script>
        const groupMap = {
            1: "文法商 (數A課程路徑)", 
            2: "文法商 (數B課程路徑)", 
            3: "理工資", 
            4: "生醫農"
            };

        window.onload = () => {
            if (!localStorage.getItem('jwt_token')) window.location.href = '/login';
            loadData();
        };

        async function loadData() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/admin/all`, {
                    headers: {'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`}
                });

                if (res.status === 401 || res.status === 403) {
                    Swal.fire({ icon: 'error', title: '權限不足', text: '請重新登入' }).then(() => { window.location.href = '/login'; });
                    return;
                }

                const data = await res.json(); // 1. 記得解析 JSON
                const tbody = document.querySelector('#data-table tbody'); // 2. 選取表格內的 tbody
                tbody.innerHTML = ''; // 清空舊資料

                data.forEach(student => {
                    const row = document.createElement('tr');

                    // 建立每一個欄位 (學號, 姓名, 類組, 時間)
                    // 將欄位資料放在陣列中，用迴圈處理，讓程式更簡潔
                    const fields = [
                        student.student_id, 
                        student.name, 
                        student.student_class_num || '未填寫', // <--- 補上這行，它才會畫出對應的 td
                        groupMap[student.choice] || '未選', 
                        student.updated_at || ''
                    ];

                    fields.forEach(fieldValue => {
                        const td = document.createElement('td');
                        td.textContent = fieldValue; // 3. 使用 textContent，完全杜絕 XSS
                        row.appendChild(td);
                    });
                    
                    tbody.appendChild(row);
                });
            } catch (e) {
                console.error("載入資料失敗:", e);
                Swal.fire({ icon: 'error', title: '讀取失敗', text: '無法從伺服器取得資料' });
            }
        }

        async function exportToCSV() {
            const res = await fetch(`${CONFIG.API_BASE_URL}/admin/all`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` }
            });
            const data = await res.json();
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF學號,姓名,班級座號,類組,更新時間\n";
            data.forEach(row => {
                csvContent += `${row.student_id},${row.name},${row.student_class_num || ''},${groupMap[row.choice] || '未選'},${row.updated_at || ''}\n`;
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", "選填資料.csv");
            document.body.appendChild(link);
            link.click();
        }
        
        async function uploadCSV() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            if (!file) { Swal.fire({ icon: 'warning', title: '提示', text: '請先選擇一個 CSV 檔案' }); return; }

            const formData = new FormData();
            formData.append("file", file);

            Swal.fire({ title: '上傳中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/admin/import-students`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` },
                    body: formData
                });

                if (res.ok) {
                    Swal.fire({ icon: 'success', title: '匯入成功', text: '學生資料已更新' });
                    loadData();
                } else {
                    const err = await res.json();
                    Swal.fire({ icon: 'error', title: '匯入失敗', text: err.detail || '請檢查格式' });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: '系統錯誤', text: '無法連線至伺服器' });
            }
        }

        async function changePassword() {
            const res = await fetch(`${CONFIG.API_BASE_URL}/change-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` },
                body: JSON.stringify({ old_password: document.getElementById('oldPwd').value, new_password: document.getElementById('newPwd').value })
            });
            res.ok ? Swal.fire({ icon: 'success', title: '修改成功' }) : Swal.fire({ icon: 'error', title: '修改失敗' });
        }

        // --- admin.html JavaScript 新增函式 ---

        async function sendReminders() {
            // 1. 取得 Token
            const token = localStorage.getItem('jwt_token');
            if (!token) {
                Swal.fire({ icon: 'error', title: '認證失敗', text: '請重新登入' });
                return;
            }

            // 2. 二次確認
            const result = await Swal.fire({
                title: '確定要寄送提醒信嗎？',
                text: "系統將找出所有『尚未選填志願』的學生，並逐一寄送 Email。此操作無法復原，且需要一段時間。",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#f4b400',
                cancelButtonColor: '#aaa',
                confirmButtonText: '確定，開始寄送',
                cancelButtonText: '取消'
            });

            if (!result.isConfirmed) return;

            // 3. 鎖定按鈕並顯示處理中狀態
            const btn = document.getElementById('reminderBtn');
            btn.disabled = true;
            btn.innerText = "⏳ 正在處理中，請勿關閉視窗...";
            
            Swal.fire({
                title: '正在執行寄送任務',
                html: '正在連線資料庫並逐一發送郵件，<br>這可能需要幾分鐘的時間，請稍候...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading(); // 顯示載入動畫
                }
            });

            // 4. 呼叫後端 API
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/admin/send-reminders`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                // 5. 處理結果
                const data = await res.json();
                
                if (res.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: '任務完成',
                        text: data.message, // 顯示後端傳回的成功訊息（包含成功/失敗封數）
                        confirmButtonText: '太棒了'
                    });
                } else {
                    // 如果後端回傳錯誤 (例如 401, 403, 500)
                    Swal.fire({
                        icon: 'error',
                        title: '寄送失敗',
                        text: data.detail || '系統發生未知錯誤，請稍後再試。'
                    });
                }
            } catch (e) {
                // 如果連線失敗 (例如網路斷線, 伺服器掛掉)
                console.error("提醒任務錯誤:", e);
                Swal.fire({
                    icon: 'error',
                    title: '連線失敗',
                    text: '無法連線至伺服器，請檢查網路連線或伺服器狀態。'
                });
            } finally {
                // 6. 無論成功或失敗，都恢復按鈕狀態
                btn.disabled = false;
                btn.innerText = "📧 寄送未選填提醒信";
            }
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }
    </script>
</body>
</html>
