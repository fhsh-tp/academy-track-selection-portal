<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://student-choice-sys.onrender.com;">
    <meta charset="UTF-8">
    <title>管理員後台 - 復興高中選班群系統</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .top-left { position: absolute; top: 20px; left: 20px; }
        .bottom-right { display: flex; justify-content: flex-end; margin-top: 30px; }
        .password-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; width: 300px; }
        .btn-logout { background-color: #d93025; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        
        /* 功能按鈕樣式 */
        .btn-export { background-color: #0f9d58; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-reminder { background-color: #f4b400; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: background-color 0.3s; }
        .btn-reminder:hover { background-color: #d19a00; }
        .btn-reminder:disabled { background-color: #ccc; cursor: not-allowed; }

        .admin-panel { padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; flex: 1; min-width: 320px; }
        .control-group { margin-top: 20px; display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
        .action-stack { display: flex; flex-direction: column; gap: 12px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>
    <div class="top-left">
        <button onclick="logout()" class="btn-logout">登出系統</button>
    </div>

    <div class="container wide">
        <h2 style="text-align: center;">管理員控制中心</h2>
        
        <div style="overflow-x: auto;">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>學號</th>
                        <th>姓名</th>
                        <th>班級座號</th>
                        <th>志願班群</th>
                        <th>最後更新時間</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <div class="control-group">
            
            <div class="action-stack">
                <button onclick="exportToCSV()" class="btn-export">📥 匯出選填結果 (CSV)</button>
                <button onclick="sendReminders()" class="btn-reminder" id="reminderBtn">
                    📧 寄送未選填提醒信
                </button>
            </div>
            
            <div class="admin-panel">
                <h3 style="margin-top: 0;">學生名單批次匯入</h3>
                <input type="file" id="csvFile" accept=".csv" style="margin-bottom: 10px; display: block;">
                <button onclick="uploadCSV()" class="btn-primary">📤 開始上傳匯入</button>
                <p style="font-size: 0.85em; color: #666; margin-top: 10px;">
                    💡 注意：CSV 標頭須包含「學號, 姓名, 電子信箱, 學生座號」
                </p>
            </div>

        </div>

        <div class="bottom-right">
            <div class="password-box">
                <h3 style="margin-top: 0;">修改管理員密碼</h3>
                <input type="password" id="oldPwd" placeholder="輸入舊密碼" class="input-field" style="width: 100%; margin-bottom: 10px;">
                <input type="password" id="newPwd" placeholder="輸入新密碼" class="input-field" style="width: 100%; margin-bottom: 10px;">
                <button onclick="changePassword()" class="btn-primary" style="width: 100%;">確認修改</button>
            </div>
        </div>
    </div>

    <script src="/static/config.js"></script>
    <script>
        const groupMap = {
            1: "文法商 (數A)", 
            2: "文法商 (數B)", 
            3: "理工資", 
            4: "生醫農"
        };

        window.onload = () => {
            if (!localStorage.getItem('jwt_token')) window.location.href = '/login';
            loadData();
        };

        // 1. 載入學生資料
        async function loadData() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/admin/all`, {
                    headers: {'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`}
                });

                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login';
                    return;
                }

                const data = await res.json();
                const tbody = document.querySelector('#data-table tbody');
                tbody.innerHTML = '';

                data.forEach(student => {
                    const row = document.createElement('tr');
                    const fields = [
                        student.student_id, 
                        student.name, 
                        student.student_class_num || '未填寫', 
                        groupMap[student.choice] || '未選', 
                        student.updated_at || ''
                    ];

                    fields.forEach(val => {
                        const td = document.createElement('td');
                        td.textContent = val;
                        row.appendChild(td);
                    });
                    tbody.appendChild(row);
                });
            } catch (e) {
                console.error("Load error:", e);
                Swal.fire({ icon: 'error', title: '讀取失敗', text: '伺服器連線異常' });
            }
        }

        // 2. 匯出 CSV
        async function exportToCSV() {
            const res = await fetch(`${CONFIG.API_BASE_URL}/admin/all`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` }
            });
            const data = await res.json();
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF學號,姓名,班級座號,類組,更新時間\n";
            data.forEach(row => {
                csvContent += `${row.student_id},${row.name},${row.student_class_num || ''},${groupMap[row.choice] || '未選'},${row.updated_at || ''}\n`;
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", "選填結果匯出.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 3. 匯入學生資料
        async function uploadCSV() {
            const fileInput = document.getElementById('csvFile');
            if (!fileInput.files[0]) { Swal.fire({ icon: 'warning', text: '請選擇 CSV 檔案' }); return; }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            Swal.fire({ title: '處理中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/admin/import-students`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` },
                    body: formData
                });

                if (res.ok) {
                    Swal.fire({ icon: 'success', title: '匯入完成' });
                    loadData();
                } else {
                    const err = await res.json();
                    Swal.fire({ icon: 'error', title: '失敗', text: err.detail });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', text: '網路錯誤' });
            }
        }

        // 4. 手動寄送提醒信
        async function sendReminders() {
            const result = await Swal.fire({
                title: '寄送提醒信？',
                text: "將通知所有「尚未選填」的學生，此動作需耗時數分鐘。",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#f4b400'
            });

            if (!result.isConfirmed) return;

            const btn = document.getElementById('reminderBtn');
            btn.disabled = true;
            btn.innerText = "⏳ 處理中...";
            Swal.fire({ title: '發送中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/admin/send-reminders`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` }
                });
                const data = await res.json();
                Swal.fire({ icon: res.ok ? 'success' : 'error', title: '任務結束', text: data.message || data.detail });
            } catch (e) {
                Swal.fire({ icon: 'error', text: '連線超時' });
            } finally {
                btn.disabled = false;
                btn.innerText = "📧 寄送未選填提醒信";
            }
        }

        // 5. 修改密碼與登出
        async function changePassword() {
            const old_password = document.getElementById('oldPwd').value;
            const new_password = document.getElementById('newPwd').value;
            if (!old_password || !new_password) { Swal.fire({ text: '請填寫密碼' }); return; }

            const res = await fetch(`${CONFIG.API_BASE_URL}/change-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('jwt_token')}` },
                body: JSON.stringify({ old_password, new_password })
            });
            res.ok ? Swal.fire({ icon: 'success', title: '修改成功' }) : Swal.fire({ icon: 'error', title: '修改失敗' });
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }
    </script>
</body>
</html>
