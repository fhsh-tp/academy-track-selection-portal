<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理員登入</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container login-box">
        <h2>🔒 管理員後台登入</h2>
        <input type="text" id="sid" placeholder="管理員帳號" class="input-field">
        <input type="password" id="pwd" placeholder="密碼" class="input-field">
        <button id="loginBtn" onclick="doAdminLogin()" class="btn-primary">進入管理後台</button>
    </div>

    <script src="/static/config.js"></script>
    <script>
        async function doAdminLogin() {
            const sid = document.getElementById('sid').value;
            const pwd = document.getElementById('pwd').value;
            
            // 簡單的前端防呆
            if (!sid || !pwd) {
                Swal.fire({ icon: 'warning', title: '提示', text: '請輸入帳號與密碼' });
                return;
            }

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/admin-login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ student_id: sid, password: pwd })
                });
                const data = await res.json();
                
                if (res.ok) {
                    if (data.role !== 'admin') {
                        Swal.fire({ icon: 'error', title: '權限錯誤', text: '此入口僅限管理員使用' });
                        return;
                    }
                    localStorage.setItem('jwt_token', data.access_token);
                    localStorage.setItem('user_role', data.role);
                    
                    // 專業的成功提示
                    Swal.fire({
                        icon: 'success',
                        title: '登入成功',
                        text: '正在進入管理後台...',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => {
                        window.location.href = '/admin';
                    });
                } else {
                    Swal.fire({ icon: 'error', title: '登入失敗', text: '帳號或密碼錯誤' });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: '系統錯誤', text: '無法連線至伺服器' });
            }
        }
    </script>
</body>
</html>
